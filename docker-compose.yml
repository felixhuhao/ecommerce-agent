services:
  app:
    build:
      context: .
    image: ecommerce-agent:local
    container_name: ecommerce-agent-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      MONGO_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME:-ecommerce_agent}:${MONGO_INITDB_ROOT_PASSWORD:-dev-mongo-password}@mongo:27017/?authSource=admin"
      SANDBOX_BACKEND: remote
      SANDBOX_EXECUTOR_URL: http://sandbox-executor:8000
      SPRING_MCP_URL: ${SPRING_MCP_URL_CONTAINER:-http://host.docker.internal:8080/mcp}
      APPROVAL_API_BASE_URL: ${APPROVAL_API_BASE_URL_CONTAINER:-http://host.docker.internal:8080}
      NL2SQL_MCP_URL: ${NL2SQL_MCP_URL_CONTAINER:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${ECOMMERCE_AGENT_PORT:-8010}:8000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: ecommerce-agent-mongo
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-ecommerce_agent}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-dev-mongo-password}
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

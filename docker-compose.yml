services:
  mongo:
    image: mongo:7
    container_name: ecommerce-agent-mongo
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-ecommerce_agent}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-dev-mongo-password}
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
